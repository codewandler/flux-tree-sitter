<svg xmlns="http://www.w3.org/2000/svg" width="768" height="370" viewBox="0 0 768 370" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, 'Liberation Mono', monospace" font-size="15">
  <rect width="768" height="370" rx="10" fill="#282c34"/>
  <circle cx="20" cy="22" r="6" fill="#e06c75"/>
  <circle cx="40" cy="22" r="6" fill="#e5c07b"/>
  <circle cx="60" cy="22" r="6" fill="#98c379"/>
  <text x="22" y="60" xml:space="preserve"><tspan fill="#c678dd">flow</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">route</tspan><tspan fill="#828997">-</tspan><tspan fill="#61afef">call</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e06c75">utterance</tspan><tspan fill="#828997">:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e5c07b">String</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">caller_id</tspan><tspan fill="#828997">:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e5c07b">String</tspan><tspan fill="#abb2bf">) </tspan><tspan fill="#828997">-&gt;</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e5c07b">RouteResult</tspan></text>
  <text x="22" y="82" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#7f848e"># one model-cost step: extract intent + slots</tspan></text>
  <text x="22" y="104" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#e06c75">$extract</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">=</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">intent_extract</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e06c75">$utterance</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">schema:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">CallerSlots</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">intents:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">Intent</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="22" y="126" xml:space="preserve"></text>
  <text x="22" y="148" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#56b6c2">@effect</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#56b6c2">network</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="22" y="170" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#e06c75">$ctx</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">=</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">booking_lookup</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e06c75">$caller_id</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="22" y="192" xml:space="preserve"></text>
  <text x="22" y="214" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#c678dd">when</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">$extract</tspan><tspan fill="#828997">.</tspan><tspan fill="#e06c75">intent</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">==</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#98c379">"book_flight"</tspan></text>
  <text x="22" y="236" xml:space="preserve"><tspan fill="#abb2bf">    </tspan><tspan fill="#c678dd">confirm</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#98c379">"Create booking to {slots.destination}?"</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#c678dd">risk</tspan><tspan fill="#828997">:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">medium</tspan></text>
  <text x="22" y="258" xml:space="preserve"><tspan fill="#abb2bf">      </tspan><tspan fill="#e06c75">$booking</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">=</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">booking_create</tspan><tspan fill="#abb2bf">(</tspan><tspan fill="#e06c75">$extract</tspan><tspan fill="#828997">.</tspan><tspan fill="#e06c75">slots</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">caller:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">$caller_id</tspan><tspan fill="#abb2bf">)</tspan></text>
  <text x="22" y="280" xml:space="preserve"><tspan fill="#abb2bf">      </tspan><tspan fill="#c678dd">return</tspan><tspan fill="#abb2bf"> { </tspan><tspan fill="#828997">intent:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">$extract</tspan><tspan fill="#828997">.</tspan><tspan fill="#e06c75">intent</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#828997">ref:</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">$booking</tspan><tspan fill="#828997">.</tspan><tspan fill="#e06c75">ref</tspan><tspan fill="#abb2bf"> }</tspan></text>
  <text x="22" y="302" xml:space="preserve"><tspan fill="#abb2bf">  </tspan><tspan fill="#c678dd">else</tspan></text>
  <text x="22" y="324" xml:space="preserve"><tspan fill="#abb2bf">    </tspan><tspan fill="#c678dd">do</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#61afef">escalate</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#98c379">"no-match"</tspan><tspan fill="#828997">,</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#e06c75">$utterance</tspan></text>
  <text x="22" y="346" xml:space="preserve"><tspan fill="#abb2bf">    </tspan><tspan fill="#c678dd">return</tspan><tspan fill="#abb2bf"> </tspan><tspan fill="#98c379">"escalated"</tspan></text>
</svg>
